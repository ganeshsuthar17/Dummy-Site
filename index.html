<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumière — Cosmetics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --plum:       #3D1A5C;
    --violet:     #6B3FA0;
    --lavender:   #B89FD8;
    --blush:      #F0E8FF;
    --mist:       #FAF7FF;
    --ink:        #1A0A2E;
    --mid:        #7A6A90;
    --white:      #FFFFFF;
    --border:     #E2D4F5;
    --accent:     #C084FC;
    --success:    #4ADE80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--mist);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,247,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem; font-weight: 600;
    color: var(--plum); letter-spacing: 0.04em;
  }
  .logo span { color: var(--accent); }

  .nav-right { display: flex; align-items: center; gap: 1.5rem; }

  .cart-btn {
    position: relative; background: var(--plum); color: white;
    border: none; border-radius: 50px;
    padding: 0.55rem 1.2rem; font-size: 0.85rem; font-family: 'DM Sans',sans-serif;
    cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
    transition: background 0.2s;
  }
  .cart-btn:hover { background: var(--violet); }
  .cart-count {
    background: var(--accent); color: white;
    border-radius: 50%; width: 20px; height: 20px;
    font-size: 0.7rem; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, var(--plum) 0%, var(--violet) 60%, #9B59B6 100%);
    padding: 5rem 2rem 4rem;
    text-align: center; position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(192,132,252,0.25) 0%, transparent 70%);
  }
  .hero-eyebrow {
    font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--lavender); margin-bottom: 1rem;
  }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 5vw, 4rem);
    font-weight: 300; color: white; line-height: 1.15;
    margin-bottom: 1rem; position: relative;
  }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero p { color: var(--lavender); font-size: 1rem; max-width: 480px; margin: 0 auto; }

  /* ── FILTERS ── */
  .filters {
    padding: 1.5rem 2rem;
    display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .filter-label { font-size: 0.78rem; color: var(--mid); letter-spacing: 0.06em; text-transform: uppercase; }
  .filter-btn {
    padding: 0.4rem 1rem; border-radius: 50px;
    border: 1px solid var(--border); background: white;
    font-size: 0.82rem; font-family: 'DM Sans', sans-serif;
    color: var(--mid); cursor: pointer; transition: all 0.18s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--plum); color: white; border-color: var(--plum);
  }

  /* ── GRID ── */
  .products-section { padding: 2rem; }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 400; color: var(--plum);
    margin-bottom: 1.5rem;
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.5rem;
  }

  .product-card {
    background: white; border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(61,26,92,0.12); }

  .product-image {
    height: 180px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem; position: relative;
  }
  .product-badge {
    position: absolute; top: 10px; left: 10px;
    background: var(--plum); color: white;
    font-size: 0.65rem; font-weight: 500; letter-spacing: 0.08em;
    padding: 0.2rem 0.6rem; border-radius: 50px; text-transform: uppercase;
  }

  .product-info { padding: 1rem 1.1rem 1.2rem; flex: 1; display: flex; flex-direction: column; }
  .product-category { font-size: 0.7rem; color: var(--mid); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.3rem; }
  .product-name { font-size: 0.95rem; font-weight: 500; color: var(--ink); margin-bottom: 0.4rem; line-height: 1.35; }
  .product-desc { font-size: 0.78rem; color: var(--mid); line-height: 1.5; flex: 1; margin-bottom: 0.8rem; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .product-price { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--plum); }

  .add-btn {
    background: var(--plum); color: white; border: none;
    border-radius: 50px; padding: 0.4rem 0.9rem;
    font-size: 0.78rem; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background 0.18s;
  }
  .add-btn:hover { background: var(--violet); }
  .add-btn.added { background: var(--success); color: #065f46; }

  /* ── CART SIDEBAR ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(26,10,46,0.5);
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .cart-sidebar {
    position: fixed; top: 0; right: -420px; width: 420px; max-width: 100vw;
    height: 100vh; background: white; z-index: 201;
    display: flex; flex-direction: column;
    box-shadow: -8px 0 40px rgba(61,26,92,0.18);
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .cart-sidebar.open { right: 0; }

  .sidebar-header {
    padding: 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--plum); }
  .close-btn {
    background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--mid);
    line-height: 1;
  }
  .close-btn:hover { color: var(--plum); }

  .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }

  .cart-empty {
    text-align: center; padding: 3rem 1rem;
    color: var(--mid); font-size: 0.9rem;
  }
  .cart-empty .empty-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }

  .cart-item {
    display: flex; gap: 1rem; padding: 1rem 0;
    border-bottom: 1px solid var(--border);
  }
  .cart-item-icon { font-size: 2.2rem; flex-shrink: 0; width: 52px; height: 52px; display:flex; align-items:center; justify-content:center; background: var(--blush); border-radius: 10px; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 0.88rem; font-weight: 500; margin-bottom: 0.2rem; }
  .cart-item-price { font-size: 0.82rem; color: var(--violet); font-weight: 500; }
  .cart-item-controls { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
  .qty-btn {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1px solid var(--border); background: white;
    cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
    color: var(--plum); font-weight: 600;
  }
  .qty-btn:hover { background: var(--blush); }
  .qty-display { font-size: 0.85rem; font-weight: 500; min-width: 20px; text-align: center; }
  .remove-btn { background: none; border: none; color: #f87171; cursor: pointer; font-size: 0.75rem; margin-left: auto; }

  .cart-footer { padding: 1.5rem; border-top: 1px solid var(--border); }
  .cart-subtotal { display: flex; justify-content: space-between; margin-bottom: 1rem; }
  .cart-subtotal span { font-size: 0.9rem; color: var(--mid); }
  .cart-subtotal strong { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--plum); }
  .checkout-btn {
    width: 100%; background: linear-gradient(135deg, var(--plum), var(--violet));
    color: white; border: none; border-radius: 50px;
    padding: 0.9rem; font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
    font-weight: 500; cursor: pointer; transition: opacity 0.2s;
  }
  .checkout-btn:hover { opacity: 0.9; }

  /* ── CHECKOUT MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,10,46,0.6);
    z-index: 300; display: none; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: white; border-radius: 20px;
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
    padding: 2rem;
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .modal-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--plum); }

  .form-section-label {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--mid); margin: 1.2rem 0 0.8rem; display: block;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .form-group { margin-bottom: 0; display: flex; flex-direction: column; }
  .form-group label { font-size: 0.78rem; color: var(--mid); margin-bottom: 0.3rem; }
  .form-group input, .form-group select {
    padding: 0.65rem 0.9rem; border: 1px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--ink);
    background: white; outline: none; transition: border-color 0.18s;
    width: 100%;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--violet); }
  .form-group.full { grid-column: 1 / -1; }

  .order-summary {
    background: var(--blush); border-radius: 12px;
    padding: 1rem 1.2rem; margin: 1.2rem 0;
  }
  .order-summary-title { font-size: 0.78rem; font-weight: 500; color: var(--plum); margin-bottom: 0.75rem; }
  .order-line { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--mid); margin-bottom: 0.4rem; }
  .order-total { display: flex; justify-content: space-between; font-weight: 600; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .order-total span { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--plum); }

  .place-order-btn {
    width: 100%; background: linear-gradient(135deg, var(--plum), var(--violet));
    color: white; border: none; border-radius: 50px;
    padding: 1rem; font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
    font-weight: 500; cursor: pointer; margin-top: 1rem; transition: opacity 0.2s;
  }
  .place-order-btn:hover { opacity: 0.9; }

  /* ── SUCCESS ── */
  .success-screen {
    text-align: center; padding: 2rem 1rem;
  }
  .success-icon { font-size: 4rem; margin-bottom: 1rem; display: block; }
  .success-screen h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--plum); margin-bottom: 0.5rem; }
  .success-screen p { color: var(--mid); font-size: 0.9rem; }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 2rem;
    color: var(--mid); font-size: 0.78rem;
    border-top: 1px solid var(--border); margin-top: 3rem;
  }

  @media (max-width: 500px) {
    .form-row { grid-template-columns: 1fr; }
    .hero { padding: 3rem 1.5rem 2.5rem; }
    .products-section { padding: 1.5rem; }
    .filters { padding: 1rem 1.5rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">Lumi<span>è</span>re</div>
  <div class="nav-right">
    <button class="cart-btn" onclick="openCart()">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <p class="hero-eyebrow">New Collection · 2025</p>
  <h1>Beauty that feels <em>like you</em></h1>
  <p>Curated cosmetics for every skin tone and texture — crafted with intention.</p>
</section>

<!-- FILTERS -->
<div class="filters">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
  <button class="filter-btn" onclick="filterProducts('lips', this)">Lips</button>
  <button class="filter-btn" onclick="filterProducts('eyes', this)">Eyes</button>
  <button class="filter-btn" onclick="filterProducts('face', this)">Face</button>
  <button class="filter-btn" onclick="filterProducts('skincare', this)">Skincare</button>
</div>

<!-- PRODUCTS -->
<section class="products-section">
  <h2 class="section-title">Our Products</h2>
  <div class="products-grid" id="productsGrid"></div>
</section>

<footer>© 2025 Lumière Cosmetics · All rights reserved · Checkout is for demo only</footer>

<!-- CART SIDEBAR -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="sidebar-header">
    <h2>Your Cart</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-subtotal">
      <span>Subtotal</span>
      <strong id="cartTotal">₹0</strong>
    </div>
    <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout →</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkoutModal">
  <div class="modal">
    <div id="checkoutContent"></div>
  </div>
</div>

<script>
const products = [
  { id:1, name:"Velvet Matte Lipstick", category:"lips", price:649, icon:"💄", desc:"Long-wear matte formula in 12 deep shades.", badge:"Bestseller", bg:"#FFF0F5" },
  { id:2, name:"Plum Lip Gloss", category:"lips", price:449, icon:"✨", desc:"High-shine gloss with a hint of plum tint.", bg:"#F5F0FF" },
  { id:3, name:"Lip Liner Duo", category:"lips", price:349, icon:"🖊️", desc:"Precision-tip liner in nude & berry shades.", bg:"#FFF5EE" },
  { id:4, name:"Kohl Eye Kajal", category:"eyes", price:299, icon:"👁️", desc:"Ultra-black waterproof kajal. 24hr hold.", badge:"New", bg:"#F0F0FF" },
  { id:5, name:"Volumizing Mascara", category:"eyes", price:599, icon:"🖤", desc:"Buildable volume mascara, no clumping.", bg:"#F5F0FF" },
  { id:6, name:"Eyeshadow Palette", category:"eyes", price:1199, icon:"🎨", desc:"12 shades — matte, shimmer, and glitter.", badge:"Bestseller", bg:"#FFF0FF" },
  { id:7, name:"Liquid Eyeliner", category:"eyes", price:399, icon:"🖋️", desc:"Precision felt tip, smudge-proof formula.", bg:"#F0F5FF" },
  { id:8, name:"HD Foundation", category:"face", price:899, icon:"🧴", desc:"Skin-match foundation, SPF 30, 20 shades.", badge:"New", bg:"#FFF8F0" },
  { id:9, name:"Radiance Blush", category:"face", price:549, icon:"🌸", desc:"Buildable powder blush in 6 rosy tones.", bg:"#FFF0F5" },
  { id:10, name:"Setting Powder", category:"face", price:699, icon:"☁️", desc:"Lightweight translucent finishing powder.", bg:"#F8F5FF" },
  { id:11, name:"Glow Highlighter", category:"face", price:749, icon:"✨", desc:"Pressed powder for a natural lit-from-within glow.", bg:"#FFFBF0" },
  { id:12, name:"Vitamin C Serum", category:"skincare", price:1099, icon:"🍊", desc:"Brightening 15% Vitamin C with hyaluronic acid.", badge:"Bestseller", bg:"#FFF8F0" },
  { id:13, name:"Rose Toner Mist", category:"skincare", price:499, icon:"🌹", desc:"Soothing face mist with rose water & niacinamide.", bg:"#FFF0F5" },
  { id:14, name:"SPF 50 Sunscreen", category:"skincare", price:599, icon:"🌞", desc:"Lightweight, no white cast. PA++++.", badge:"New", bg:"#FFFFF0" },
  { id:15, name:"Night Repair Cream", category:"skincare", price:1299, icon:"🌙", desc:"Retinol-enriched overnight regenerating cream.", bg:"#F0F0FF" },
  { id:16, name:"Micellar Cleanser", category:"skincare", price:449, icon:"💧", desc:"Gentle oil-free makeup remover for all skin types.", bg:"#F0F8FF" },
];

let cart = [];
let currentFilter = 'all';

function renderProducts(filter) {
  const grid = document.getElementById('productsGrid');
  const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" data-category="${p.category}">
      <div class="product-image" style="background:${p.bg}">
        ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
        <span style="font-size:3.2rem">${p.icon}</span>
      </div>
      <div class="product-info">
        <div class="product-category">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-footer">
          <span class="product-price">₹${p.price}</span>
          <button class="add-btn" id="btn-${p.id}" onclick="addToCart(${p.id})">Add</button>
        </div>
      </div>
    </div>
  `).join('');
}

function filterProducts(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderProducts(cat);
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(i => i.id === id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }
  updateCartUI();
  const btn = document.getElementById('btn-' + id);
  if (btn) {
    btn.textContent = '✓ Added';
    btn.classList.add('added');
    setTimeout(() => { btn.textContent = 'Add'; btn.classList.remove('added'); }, 1200);
  }
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartCount').textContent = total;
  renderCartItems();
}

function renderCartItems() {
  const container = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if (cart.length === 0) {
    container.innerHTML = `<div class="cart-empty"><span class="empty-icon">🛒</span>Your cart is empty.<br>Add some products!</div>`;
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'block';
  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-icon">${item.icon}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">₹${item.price} each</div>
        <div class="cart-item-controls">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
          <span class="qty-display">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
        </div>
      </div>
    </div>
  `).join('');
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cartTotal').textContent = '₹' + subtotal.toLocaleString('en-IN');
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  updateCartUI();
}

function removeItem(id) {
  cart = cart.filter(i => i.id !== id);
  updateCartUI();
}

function openCart() {
  document.getElementById('cartSidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  renderCartItems();
}
function closeCart() {
  document.getElementById('cartSidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function openCheckout() {
  closeCart();
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const shipping = subtotal >= 999 ? 0 : 99;
  const total = subtotal + shipping;

  document.getElementById('checkoutContent').innerHTML = `
    <div class="modal-header">
      <h2>Checkout</h2>
      <button class="close-btn" onclick="closeCheckout()">✕</button>
    </div>
    <span class="form-section-label">Contact</span>
    <div class="form-row">
      <div class="form-group"><label>First Name</label><input type="text" placeholder="Priya"></div>
      <div class="form-group"><label>Last Name</label><input type="text" placeholder="Sharma"></div>
      <div class="form-group full"><label>Email</label><input type="email" placeholder="priya@email.com"></div>
      <div class="form-group full"><label>Phone</label><input type="tel" placeholder="+91 98765 43210"></div>
    </div>
    <span class="form-section-label">Delivery Address</span>
    <div class="form-row">
      <div class="form-group full"><label>Address Line 1</label><input type="text" placeholder="Flat 12, Rose Apartments"></div>
      <div class="form-group full"><label>Address Line 2</label><input type="text" placeholder="MG Road (optional)"></div>
      <div class="form-group"><label>City</label><input type="text" placeholder="Bengaluru"></div>
      <div class="form-group"><label>PIN Code</label><input type="text" placeholder="560001"></div>
      <div class="form-group full">
        <label>State</label>
        <select><option>Karnataka</option><option>Maharashtra</option><option>Tamil Nadu</option><option>Delhi</option><option>Telangana</option><option>Gujarat</option><option>Other</option></select>
      </div>
    </div>
    <span class="form-section-label">Payment (Demo)</span>
    <div class="form-row">
      <div class="form-group full"><label>Card Number</label><input type="text" placeholder="4242 4242 4242 4242" maxlength="19"></div>
      <div class="form-group"><label>Expiry</label><input type="text" placeholder="MM / YY" maxlength="7"></div>
      <div class="form-group"><label>CVV</label><input type="text" placeholder="123" maxlength="3"></div>
    </div>
    <div class="order-summary">
      <div class="order-summary-title">Order Summary</div>
      ${cart.map(i => `<div class="order-line"><span>${i.name} ×${i.qty}</span><span>₹${(i.price*i.qty).toLocaleString('en-IN')}</span></div>`).join('')}
      <div class="order-line"><span>Shipping</span><span>${shipping === 0 ? 'Free' : '₹'+shipping}</span></div>
      <div class="order-total"><span>Total</span><span>₹${total.toLocaleString('en-IN')}</span></div>
    </div>
    <button class="place-order-btn" onclick="placeOrder()">Place Order →</button>
  `;
  document.getElementById('checkoutModal').classList.add('open');
}

function closeCheckout() {
  document.getElementById('checkoutModal').classList.remove('open');
}

function placeOrder() {
  document.getElementById('checkoutContent').innerHTML = `
    <div class="success-screen">
      <span class="success-icon">🎉</span>
      <h2>Order Placed!</h2>
      <p style="margin-bottom:0.5rem">Thank you for shopping with Lumière.</p>
      <p>This is a demo — no real order was placed.</p>
      <button class="place-order-btn" style="margin-top:1.5rem;max-width:200px" onclick="closeCheckout(); cart=[]; updateCartUI();">Back to Shop</button>
    </div>
  `;
  cart = [];
  updateCartUI();
}

// Init
renderProducts('all');
</script>
</body>
</html>
